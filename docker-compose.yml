version: "3.9"

services:
  cd_auth:
    image: postgres:15
    container_name: cd_auth_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cd_auth
    volumes:
      - ./data/cd_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cd_auth"]
      interval: 5s
      retries: 5
      start_period: 5s

  cd_desc:
    image: postgres:15
    container_name: cd_desc_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cd_desc
    volumes:
      - ./data/cd_desc:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cd_desc"]
      interval: 5s
      retries: 5
      start_period: 5s

  cd_generator:
    image: postgres:15
    container_name: cd_generator_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cd_generator
    volumes:
      - ./data/cd_generator:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cd_generator"]
      interval: 5s
      retries: 5
      start_period: 5s

  cd_notification:
    image: postgres:15
    container_name: cd_notification_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cd_notification
    volumes:
      - ./data/cd_notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cd_notification"]
      interval: 5s
      retries: 5
      start_period: 5s

  cd_mock:
    image: postgres:15
    container_name: cd_mock_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mock
    volumes:
      - ./data/cd_mock:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mock"]
      interval: 5s
      retries: 5
      start_period: 5s

  eureka:
    build:
      context: ./checkdev_eureka
      dockerfile: Dockerfile
    container_name: eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=eureka
      - SERVER_PORT=8761

  auth:
    build:
      context: ./checkdev_auth
      dockerfile: Dockerfile
    container_name: auth
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cd_auth:5432/cd_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
    depends_on:
      - cd_auth
      - eureka

  generator:
    build:
      context: ./checkdev_generator
      dockerfile: Dockerfile
    container_name: generator
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cd_generator:5432/cd_generator
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
    depends_on:
      - cd_generator
      - eureka

  mock:
    build:
      context: ./checkdev_mock
      dockerfile: Dockerfile
    container_name: mock
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cd_mock:5432/mock
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
    depends_on:
      - cd_mock
      - generator
      - eureka

  desc:
    build:
      context: ./checkdev_desc
      dockerfile: Dockerfile
    container_name: desc
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cd_desc:5432/cd_desc
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
    depends_on:
      - cd_desc
      - mock
      - eureka

  site:
    build:
      context: ./checkdev_site
      dockerfile: Dockerfile
    container_name: site
    ports:
      - "8080:8080"   # доступ к сайту через браузер
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
      - START_DELAY=10
    depends_on:
      - desc
      - eureka

  notification:
    build:
      context: ./checkdev_notification
      dockerfile: Dockerfile
    container_name: notification
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cd_notification:5432/cd_notification
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
      - START_DELAY=20
    depends_on:
      - cd_notification
      - site
      - eureka